[tool.black]
line-length = 88
target-version = ["py311"]
exclude = '''
/(
    \.venv
  | build
  | dist
  | migrations
)/
'''

[tool.isort]
profile = "black"
line_length = 88
skip = [".venv", "migrations"]

[tool.ruff]
line-length = 88
target-version = "py311"

exclude = [
    ".venv",
    "migrations",
    "build",
    "dist"
]

[tool.ruff.lint]
select = [
    "E",
    "F",
    "I",
    "B",
    "UP"
]

ignore = [
    "E501"
]

[tool.ruff.format]
quote-style = "double"

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "config.settings"
python_files = [
    "tests.py",
    "test_*.py",
    "*_tests.py"
]
